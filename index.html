<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的旅遊地圖</title>
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  --c-bg:        #F0EDE8;
  --c-surface:   #FFFFFF;
  --c-surface2:  #F6F3EE;
  --c-surface3:  #EDE9E2;
  --c-border:    #DDD8CF;
  --c-border2:   #C9C3B8;
  --c-text:      #26211C;
  --c-text2:     #7A7268;
  --c-text3:     #ADA79E;
  --c-accent:    #2B5FC0;
  --c-accent-lt: #E5EDFB;
  --c-accent2:   #B04518;
  --c-green:     #1E7A48;
  --c-red:       #B83030;
  --sh-xs: 0 1px 3px rgba(0,0,0,.07);
  --sh-sm: 0 2px 8px rgba(0,0,0,.09);
  --sh-md: 0 4px 18px rgba(0,0,0,.12);
  --sh-lg: 0 8px 32px rgba(0,0,0,.16);
  --left-w:  260px;
  --right-w: 280px;
  --header-h: 48px;
  --radius:    8px;
  --radius-lg: 14px;
  --tr: .22s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:var(--c-bg); }
body { font-family:'Noto Sans TC',sans-serif; color:var(--c-text); display:flex; flex-direction:column; }
button { font-family:inherit; cursor:pointer; border:none; background:none; }
input  { font-family:inherit; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--c-border2); border-radius:2px; }

/* ── Header ─────────────────────────────────────────────── */
#app-header {
  flex-shrink:0; height:var(--header-h);
  background:var(--c-surface); border-bottom:1px solid var(--c-border);
  box-shadow:var(--sh-xs); display:flex; align-items:center;
  gap:8px; padding:0 12px; z-index:500;
}
.logo { font-family:'Space Mono',monospace; font-size:12px; font-weight:700; color:var(--c-accent); letter-spacing:.06em; white-space:nowrap; }
.header-divider { width:1px; height:20px; background:var(--c-border); flex-shrink:0; }
.sidebar-toggle {
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border-radius:var(--radius); border:1.5px solid var(--c-border);
  background:var(--c-surface2); color:var(--c-text2); font-size:14px;
  transition:all var(--tr); flex-shrink:0;
}
.sidebar-toggle:hover { border-color:var(--c-accent); color:var(--c-accent); background:var(--c-accent-lt); }
.sidebar-toggle.active { background:var(--c-accent); border-color:var(--c-accent); color:#fff; }

/* Search */
.global-search { flex:1; position:relative; max-width:400px; }
.global-search svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--c-text3); pointer-events:none; }
#globalSearch {
  width:100%; height:32px; background:var(--c-surface2);
  border:1.5px solid var(--c-border); border-radius:20px;
  padding:0 9px 0 30px; font-size:12.5px; color:var(--c-text); outline:none;
  transition:border-color var(--tr), box-shadow var(--tr);
}
#globalSearch:focus { border-color:var(--c-accent); box-shadow:0 0 0 3px var(--c-accent-lt); }
#globalSearch::placeholder { color:var(--c-text3); }
#searchResults {
  position:absolute; top:calc(100% + 4px); left:0; right:0;
  background:var(--c-surface); border:1px solid var(--c-border);
  border-radius:var(--radius); box-shadow:var(--sh-md);
  max-height:220px; overflow-y:auto; z-index:9999; display:none;
}
.sr-item {
  padding:8px 12px; font-size:12.5px; cursor:pointer;
  border-bottom:1px solid var(--c-border); transition:background var(--tr);
  display:flex; align-items:center; gap:8px;
}
.sr-item:last-child { border-bottom:none; }
.sr-item:hover { background:var(--c-accent-lt); }
.sr-cat { font-size:10px; color:var(--c-text3); white-space:nowrap; margin-left:auto; }

/* Stat pills */
.h-pills { display:flex; gap:4px; flex-wrap:nowrap; }
.h-pill { background:var(--c-surface2); border:1px solid var(--c-border); border-radius:20px; padding:2px 8px; font-size:10.5px; color:var(--c-text2); white-space:nowrap; }
.h-pill b { color:var(--c-accent2); }

/* GPS */
#btnGPS {
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border-radius:var(--radius); border:1.5px solid var(--c-border);
  background:var(--c-surface2); color:var(--c-text2); font-size:15px;
  transition:all var(--tr); flex-shrink:0;
}
#btnGPS:hover { border-color:var(--c-accent); color:var(--c-accent); background:var(--c-accent-lt); }
#btnGPS.locating { border-color:var(--c-green); color:var(--c-green); animation:pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Layout ──────────────────────────────────────────────── */
#app-body { flex:1; display:flex; overflow:hidden; position:relative; }

/* ── Left sidebar ────────────────────────────────────────── */
#sidebar-left {
  width:var(--left-w); flex-shrink:0; background:var(--c-surface);
  border-right:1px solid var(--c-border); display:flex;
  flex-direction:column; overflow:hidden;
  box-shadow:2px 0 6px rgba(0,0,0,.04);
  transition:width var(--tr); z-index:100;
}
#sidebar-left.collapsed { width:0; overflow:hidden; }

/* ── Right panel ──────────────────────────────────────────── */
#sidebar-right {
  width:var(--right-w); flex-shrink:0; background:var(--c-surface);
  border-left:1px solid var(--c-border); display:flex;
  flex-direction:column; overflow:hidden;
  box-shadow:-2px 0 6px rgba(0,0,0,.04);
  transition:width var(--tr); z-index:100;
}
#sidebar-right.collapsed { width:0; overflow:hidden; }

/* Panel header */
.panel-head {
  flex-shrink:0; padding:8px 12px 7px;
  border-bottom:1px solid var(--c-border); background:var(--c-surface2);
  display:flex; align-items:center; gap:6px;
}
.panel-head-title { font-size:10px; font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:.08em; color:var(--c-text2); font-weight:700; }
.panel-head-badge { margin-left:auto; font-size:9.5px; font-family:'Space Mono',monospace; color:var(--c-accent2); background:var(--c-surface3); border:1px solid var(--c-border); padding:1px 6px; border-radius:3px; }

/* Search box in left panel */
.search-sec { padding:8px 10px; border-bottom:1px solid var(--c-border); flex-shrink:0; }
.search-box { position:relative; }
.search-box svg { position:absolute; left:8px; top:50%; transform:translateY(-50%); color:var(--c-text3); pointer-events:none; }
.search-box input {
  width:100%; background:var(--c-surface2); border:1.5px solid var(--c-border);
  border-radius:var(--radius); padding:6px 8px 6px 28px; font-size:12px;
  color:var(--c-text); outline:none; transition:border-color .2s,box-shadow .2s;
}
.search-box input:focus { border-color:var(--c-accent); box-shadow:0 0 0 3px var(--c-accent-lt); }
.search-box input::placeholder { color:var(--c-text3); }

/* Accordion nav */
#nav-scroll { flex:1; overflow-y:auto; padding:5px 8px 8px; }
#nav-scroll::-webkit-scrollbar { width:3px; }
#nav-scroll::-webkit-scrollbar-thumb { background:var(--c-border2); border-radius:2px; }
.country-block { margin-bottom:2px; }
.country-header {
  display:flex; align-items:center; gap:7px; padding:7px 8px;
  border-radius:var(--radius); cursor:pointer; transition:background var(--tr); user-select:none;
}
.country-header:hover, .country-header.open { background:var(--c-surface2); }
.country-arrow { font-size:9px; color:var(--c-text3); transition:transform var(--tr); width:12px; text-align:center; flex-shrink:0; }
.country-header.open .country-arrow { transform:rotate(90deg); }
.country-flag { font-size:16px; flex-shrink:0; }
.country-name { font-weight:700; font-size:12.5px; flex:1; }
.country-count { font-size:9.5px; font-family:'Space Mono',monospace; color:var(--c-text3); background:var(--c-surface3); border:1px solid var(--c-border); padding:1px 5px; border-radius:3px; }
.cities-list { overflow:hidden; max-height:0; transition:max-height .28s ease; }
.city-btn {
  display:flex; align-items:center; gap:7px; width:100%;
  padding:5px 8px 5px 26px; border-radius:6px; cursor:pointer;
  transition:all var(--tr); margin-bottom:1px; background:transparent;
  border:1.5px solid transparent; text-align:left; color:var(--c-text); font-size:11.5px;
}
.city-btn:hover { background:var(--c-surface2); border-color:var(--c-border); }
.city-btn.active { background:var(--c-accent-lt); border-color:var(--c-accent); color:var(--c-accent); }
.city-btn.no-data { opacity:.5; cursor:default; }
.city-btn.no-data:hover { background:transparent; border-color:transparent; }
.city-icon { font-size:13px; flex-shrink:0; width:18px; text-align:center; }
.city-info { flex:1; }
.city-name { display:block; font-weight:600; font-size:11.5px; line-height:1.3; }
.city-sub  { display:block; font-size:9.5px; color:var(--c-text2); }
.city-badge { font-size:9.5px; font-family:'Space Mono',monospace; color:var(--c-text3); background:var(--c-surface3); padding:1px 5px; border-radius:3px; white-space:nowrap; flex-shrink:0; }
.city-btn.active .city-badge { background:var(--c-accent-lt); color:var(--c-accent); }
.city-no-data-tag { font-size:9px; color:var(--c-text3); background:var(--c-surface3); border:1px solid var(--c-border); padding:1px 5px; border-radius:3px; white-space:nowrap; }

/* Status bar */
.status-bar { flex-shrink:0; padding:5px 12px; border-top:1px solid var(--c-border); background:var(--c-surface2); font-size:10.5px; font-family:'Space Mono',monospace; color:var(--c-text2); }
.status-bar b { color:var(--c-accent2); }

/* ── Map ─────────────────────────────────────────────────── */
#map { flex:1; z-index:1; position:relative; }
.map-fab-btn {
  width:36px; height:36px; background:var(--c-surface); border:1.5px solid var(--c-border);
  border-radius:var(--radius); box-shadow:var(--sh-sm); display:flex; align-items:center;
  justify-content:center; font-size:16px; cursor:pointer; transition:all var(--tr); color:var(--c-text);
}
.map-fab-btn:hover { border-color:var(--c-accent); color:var(--c-accent); box-shadow:var(--sh-md); }

/* Leaflet overrides */
.leaflet-control-zoom { display:none !important; }
.leaflet-popup-content-wrapper {
  background:var(--c-surface); border:1px solid var(--c-border);
  border-radius:var(--radius-lg); box-shadow:var(--sh-lg); padding:0; overflow:hidden;
}
.leaflet-popup-content { margin:0; min-width:200px; }
.leaflet-popup-tip { background:var(--c-surface); }
.leaflet-popup-close-button { color:var(--c-text2)!important; right:8px!important; top:7px!important; font-size:18px!important; }
/* Mobile touch target */
@media (max-width:768px) {
  .leaflet-marker-icon { cursor:pointer; touch-action:manipulation; }
  .leaflet-marker-pane { will-change:transform; }
}

/* Popup */
.popup-head { display:flex; align-items:center; gap:6px; padding:9px 13px 7px; border-bottom:1px solid var(--c-border); background:var(--c-surface2); }
.popup-dot  { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.popup-cat  { font-size:10px; font-family:'Space Mono',monospace; letter-spacing:.04em; text-transform:uppercase; }
.popup-body { padding:9px 13px 12px; }
.popup-name { font-size:13px; font-weight:700; color:var(--c-text); line-height:1.45; margin-bottom:4px; }
.popup-note { font-size:11.5px; color:var(--c-text2); line-height:1.5; margin-bottom:9px; }
.popup-meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:9px; }
.popup-tag  { font-size:10px; background:var(--c-surface2); border:1px solid var(--c-border); border-radius:3px; padding:1px 6px; color:var(--c-text2); }
.popup-link {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--c-accent); color:#fff; text-decoration:none;
  font-size:11.5px; font-weight:600; padding:5px 12px; border-radius:6px; transition:opacity var(--tr);
}
.popup-link:hover { opacity:.85; }

/* Clusters */
.marker-cluster-small  { background:rgba(43,95,192,.15); }
.marker-cluster-small div  { background:rgba(43,95,192,.78); }
.marker-cluster-medium { background:rgba(176,69,24,.15); }
.marker-cluster-medium div { background:rgba(176,69,24,.78); }
.marker-cluster-large  { background:rgba(184,48,48,.15); }
.marker-cluster-large div  { background:rgba(184,48,48,.78); }
.marker-cluster div { width:32px; height:32px; margin:4px; border-radius:16px; text-align:center; line-height:32px; font-size:12px; font-family:'Space Mono',monospace; color:#fff; font-weight:700; }

/* ── Right panel ──────────────────────────────────────────── */
.right-tabs { flex-shrink:0; display:flex; border-bottom:1px solid var(--c-border); background:var(--c-surface2); }
.right-tab { flex:1; padding:9px 4px; font-size:11px; font-weight:600; color:var(--c-text2); border-bottom:2px solid transparent; transition:all var(--tr); text-align:center; }
.right-tab.active { color:var(--c-accent); border-bottom-color:var(--c-accent); background:var(--c-surface); }
.right-pane { display:none; flex:1; flex-direction:column; overflow:hidden; }
.right-pane.active { display:flex; }

/* Layer controls */
.layer-actions { display:flex; gap:6px; padding:8px 9px; border-bottom:1px solid var(--c-border); flex-shrink:0; }
.layer-btn { flex:1; padding:5px 0; border-radius:6px; font-size:11px; font-weight:700; border:1.5px solid; transition:all var(--tr); text-align:center; }
.layer-btn.all  { background:var(--c-green);   border-color:var(--c-green);  color:#fff; }
.layer-btn.none { background:var(--c-surface2); border-color:var(--c-border); color:var(--c-text2); }
.layer-btn.all:hover  { opacity:.85; }
.layer-btn.none:hover { background:#fde8e8; border-color:#e57373; color:var(--c-red); }

.layer-search-sec { padding:6px 9px; border-bottom:1px solid var(--c-border); flex-shrink:0; }
.layer-search-sec input { width:100%; background:var(--c-surface2); border:1.5px solid var(--c-border); border-radius:6px; padding:5px 8px; font-size:11.5px; color:var(--c-text); outline:none; transition:border-color .2s; }
.layer-search-sec input:focus { border-color:var(--c-accent); }
.layer-search-sec input::placeholder { color:var(--c-text3); }

.leg-scroll { flex:1; overflow-y:auto; padding:4px 6px 10px; }
.leg-scroll::-webkit-scrollbar { width:3px; }
.leg-scroll::-webkit-scrollbar-thumb { background:var(--c-border2); border-radius:2px; }

/* Group header */
.grp-header { display:flex; align-items:center; gap:6px; padding:6px 6px 4px; cursor:pointer; border-radius:6px; transition:background var(--tr); margin-top:4px; user-select:none; }
.grp-header:hover { background:var(--c-surface2); }
.grp-arrow { font-size:9px; color:var(--c-text3); transition:transform var(--tr); width:12px; text-align:center; flex-shrink:0; }
.grp-arrow.open { transform:rotate(90deg); }
.grp-icon  { font-size:14px; flex-shrink:0; }
.grp-name  { font-size:11.5px; font-weight:700; color:var(--c-text); flex:1; }
.grp-toggle-all { font-size:9px; font-family:'Space Mono',monospace; color:var(--c-text3); padding:2px 6px; border-radius:3px; border:1px solid var(--c-border); background:var(--c-surface2); cursor:pointer; transition:all var(--tr); flex-shrink:0; }
.grp-toggle-all:hover { background:var(--c-accent); border-color:var(--c-accent); color:#fff; }
.grp-count { font-size:9.5px; font-family:'Space Mono',monospace; color:var(--c-text2); background:var(--c-surface3); border:1px solid var(--c-border); padding:1px 5px; border-radius:3px; flex-shrink:0; }
.grp-children { overflow:hidden; transition:max-height .25s ease; }
.leg-item { display:flex; align-items:center; gap:6px; padding:3px 6px 3px 22px; border-radius:5px; cursor:pointer; transition:background var(--tr); margin-bottom:1px; user-select:none; }
.leg-item:hover { background:var(--c-surface2); }
.leg-item.hidden { opacity:.28; }
.leg-item.hidden .leg-label { text-decoration:line-through; }
.leg-dot   { width:12px; height:12px; border-radius:50%; flex-shrink:0; border:2px solid rgba(255,255,255,.78); box-shadow:0 1px 4px rgba(0,0,0,.22); }
.leg-label { font-size:11.5px; flex:1; color:var(--c-text); }
.leg-count { font-size:9.5px; font-family:'Space Mono',monospace; color:var(--c-text2); background:var(--c-surface2); border:1px solid var(--c-border); padding:1px 5px; border-radius:3px; min-width:22px; text-align:center; }

/* Viewport list */
.vp-header { flex-shrink:0; padding:7px 10px; border-bottom:1px solid var(--c-border); background:var(--c-surface2); display:flex; align-items:center; gap:6px; }
.vp-header-label { font-size:10px; font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:.07em; color:var(--c-text2); font-weight:700; flex:1; }
.vp-count { font-size:9.5px; font-family:'Space Mono',monospace; color:var(--c-accent2); }
#viewport-scroll { flex:1; overflow-y:auto; padding:4px 6px 8px; }
#viewport-scroll::-webkit-scrollbar { width:3px; }
.vp-item { display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:6px; cursor:pointer; transition:background var(--tr); margin-bottom:1px; }
.vp-item:hover { background:var(--c-surface2); }
.vp-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.vp-name { font-size:11.5px; color:var(--c-text); flex:1; line-height:1.3; }
.vp-note { font-size:10px; color:var(--c-text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80px; }
.vp-empty { padding:28px 16px; text-align:center; color:var(--c-text3); font-size:12px; line-height:1.6; }
.vp-section-label { font-size:9px; font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:.08em; color:var(--c-text3); padding:8px 8px 3px; }

/* ── Mobile ───────────────────────────────────────────────── */
@media (max-width:768px) {
  #sidebar-left, #sidebar-right {
    position:fixed; bottom:0; width:100%!important; height:75vh;
    z-index:800; border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    box-shadow:var(--sh-lg); transform:translateY(100%);
    transition:transform .28s cubic-bezier(.32,0,.67,0); will-change:transform;
    border:none; border-top:1px solid var(--c-border);
  }
  #sidebar-left::before, #sidebar-right::before {
    content:''; display:block; width:40px; height:4px;
    background:var(--c-border2); border-radius:2px; margin:8px auto 0; flex-shrink:0;
  }
  #sidebar-left.mobile-open, #sidebar-right.mobile-open { transform:translateY(0); }
  #sidebar-left.collapsed, #sidebar-right.collapsed { width:100%!important; }
  #overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:700; opacity:0; pointer-events:none; transition:opacity var(--tr); }
  #overlay.show { opacity:1; pointer-events:auto; }
  #mobile-nav { position:fixed; bottom:0; left:0; right:0; height:56px; background:var(--c-surface); border-top:1px solid var(--c-border); box-shadow:0 -2px 12px rgba(0,0,0,.08); display:flex; z-index:600; }
  .mob-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:10.5px; color:var(--c-text2); cursor:pointer; transition:color var(--tr); border:none; background:none; }
  .mob-btn.active { color:var(--c-accent); }
  .mob-btn .mob-icon { font-size:20px; }
  #app-body { padding-bottom:56px; }
}
@media (min-width:769px) { #overlay, #mobile-nav { display:none !important; } }

/* ── Toast + Loading ──────────────────────────────────────── */
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(12px); background:#2a2a2a; color:#fff; padding:8px 18px; border-radius:6px; font-size:12.5px; z-index:9999; opacity:0; transition:opacity .3s,transform .3s; pointer-events:none; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#loading-overlay { position:fixed; inset:0; background:var(--c-bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:9998; }
.loading-spinner { width:36px; height:36px; border:3px solid var(--c-border); border-top-color:var(--c-accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-txt { font-size:13px; color:var(--c-text2); font-family:'Space Mono',monospace; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-txt" id="loading-txt">載入資料中…</div>
</div>

<!-- OVERLAY (mobile) -->
<div id="overlay"></div>

<!-- HEADER -->
<header id="app-header">
  <button class="sidebar-toggle active" id="btnToggleLeft" title="導覽">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/></svg>
  </button>
  <span class="logo">🗺 TRAVEL MAP</span>
  <div class="header-divider"></div>
  <div class="global-search">

// ============================================================
//  MARKER ICON FACTORY
// ============================================================
function makeIcon(cat) {
  const cfg  = getMasterCfg(cat);
  const emoji = MASTER_EMOJI[getMaster(cat)] || '📍';
  const id    = 'f' + Math.abs([...cat].reduce((h,c) => h*31+c.charCodeAt(0), 0) % 99997);
  return L.divIcon({
    className: '',
    html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 46" width="36" height="46">
      <defs>
        <filter id="${id}" x="-40%" y="-20%" width="180%" height="180%">
          <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="rgba(0,0,0,.28)"/>
        </filter>
        <linearGradient id="g${id}" x1="0%" y1="0%" x2="50%" y2="100%">
          <stop offset="0%" stop-color="rgba(255,255,255,.35)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,.08)"/>
        </linearGradient>
      </defs>
      <path d="M18 1C10.3 1 4 7.3 4 15c0 10.5 14 30 14 30s14-19.5 14-30C32 7.3 25.7 1 18 1z"
        fill="${cfg.color}" filter="url(#${id})" stroke="rgba(255,255,255,.85)" stroke-width="1.5"/>
      <path d="M18 1C10.3 1 4 7.3 4 15c0 10.5 14 30 14 30s14-19.5 14-30C32 7.3 25.7 1 18 1z"
        fill="url(#g${id})" stroke="none"/>
      <circle cx="18" cy="15" r="9.5" fill="rgba(255,255,255,.92)"/>
      <text x="18" y="19.5" text-anchor="middle" font-size="12" font-family="serif">${emoji}</text>
    </svg>`,
    iconSize:[36,46], iconAnchor:[18,46], popupAnchor:[0,-48],
  });
}

// ============================================================
//  BUILD MARKERS
// ============================================================
function buildMarkers() {
  if (clusterGrp) map.removeLayer(clusterGrp);
  clusterGrp = L.markerClusterGroup({
    maxClusterRadius:45, spiderfyOnMaxZoom:true,
    showCoverageOnHover:false, zoomToBoundsOnClick:true,
    iconCreateFunction(c) {
      const n = c.getChildCount(), s = n<10?'small':n<50?'medium':'large';
      return L.divIcon({ html:`<div>${n}</div>`, className:`marker-cluster marker-cluster-${s}`, iconSize:[40,40] });
    },
  });
  markerMap.clear();
  let vis = 0;
  ALL_DATA.forEach(d => {
    const lat = parseFloat(d.lat), lng = parseFloat(d.lng);
    if (isNaN(lat)||isNaN(lng)||!d.name) return;
    if (hiddenMasters.has(getMaster(d.category||''))) return;
    if (filterQuery && !d.name.toLowerCase().includes(filterQuery)) return;
    const cfg = getMasterCfg(d.category||'');
    const m   = L.marker([lat, lng], { icon:makeIcon(d.category||'其他') });
    // Build popup with note and city fields
    const noteHtml = d.note ? `<div class="popup-note">${d.note}</div>` : '';
    const tags = [d.city, d.category].filter(Boolean).map(t => `<span class="popup-tag">${t}</span>`).join('');
    m.bindPopup(
      `<div class="popup-head">
        <span class="popup-dot" style="background:${cfg.color}"></span>
        <span class="popup-cat" style="color:${cfg.color}">${getMaster(d.category||'')}</span>
      </div>
      <div class="popup-body">
        <div class="popup-name">${d.name}</div>
        ${noteHtml}
        ${tags ? `<div class="popup-meta">${tags}</div>` : ''}
        ${d.googleMapsLink ? `<a class="popup-link" href="${d.googleMapsLink}" target="_blank" rel="noopener">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg> 開啟 Google 地圖</a>` : ''}
      </div>`,
      { maxWidth:280 }
    );
    clusterGrp.addLayer(m);
    markerMap.set(d.name, { marker:m, data:{ ...d, lat, lng } });
    vis++;
  });
  map.addLayer(clusterGrp);
  document.getElementById('vis-count').textContent = vis.toLocaleString();
}

// ============================================================
//  VIEWPORT LIST (right panel, "可視清單" tab)
// ============================================================
function updateViewportList() {
  if (!document.getElementById('pane-viewport').classList.contains('active')) return;
  const bounds  = map.getBounds();
  const visible = ALL_DATA.filter(d => {
    const lat = parseFloat(d.lat), lng = parseFloat(d.lng);
    if (isNaN(lat)||isNaN(lng)) return false;
    if (hiddenMasters.has(getMaster(d.category||''))) return false;
    return bounds.contains([lat, lng]);
  });
  document.getElementById('vp-count').textContent = visible.length + ' 筆';
  const scroll = document.getElementById('viewport-scroll');
  if (!visible.length) {
    scroll.innerHTML = '<div class="vp-empty">目前可視範圍內無符合地點</div>';
    return;
  }
  // Group by master category
  const grouped = {};
  visible.forEach(d => {
    const m = getMaster(d.category||'');
    if (!grouped[m]) grouped[m] = [];
    grouped[m].push(d);
  });
  scroll.innerHTML = '';
  for (const [master, items] of Object.entries(grouped)) {
    const cfg = CATEGORIES[master] || { color:'#7F8C8D' };
    const sec = document.createElement('div');
    sec.className = 'vp-section-label';
    sec.textContent = master + ` (${items.length})`;
    scroll.appendChild(sec);
    items.slice(0, 80).forEach(d => {
      const el = document.createElement('div');
      el.className = 'vp-item';
      el.innerHTML = `<div class="vp-dot" style="background:${cfg.color}"></div>
        <div class="vp-name">${d.name}</div>
        ${d.note ? `<div class="vp-note" title="${d.note}">${d.note}</div>` : `<div class="vp-note">${d.city||''}</div>`}`;
      el.addEventListener('click', () => {
        const entry = markerMap.get(d.name);
        if (!entry) return;
        if (window.innerWidth <= 768) openMobilePanel(null);
        map.flyTo([entry.data.lat, entry.data.lng], Math.max(map.getZoom(), 16), { duration:.6 });
        map.once('moveend', () => setTimeout(() => entry.marker.openPopup(), 120));
      });
      scroll.appendChild(el);
    });
    if (items.length > 80) {
      const more = document.createElement('div');
      more.style.cssText = 'padding:4px 8px;font-size:10.5px;color:var(--c-text3)';
      more.textContent = `…還有 ${items.length-80} 筆`;
      scroll.appendChild(more);
    }
  }
}
map.on('moveend', updateViewportList);

function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function buildNav(data) {
  const MAX_SNAP = 60;
  const cityCount = {}, ccCount = {};
  data.forEach(d => {
    const lat = parseFloat(d.lat), lng = parseFloat(d.lng);
    if (isNaN(lat)||isNaN(lng)) return;
    const cc = (d.country||d.cc||'').toUpperCase();
    ccCount[cc] = (ccCount[cc]||0) + 1;
    // If CSV has city column, use it directly; otherwise snap by radius
    if (d.city) {
      cityCount[d.city] = (cityCount[d.city]||0) + 1;
    } else {
      let best = null, bestDist = MAX_SNAP;
      for (const [name, cfg] of Object.entries(CITY_CONFIG)) {
        if (cfg.cc !== cc) continue;
        const dist = haversineKm(lat, lng, cfg.center[0], cfg.center[1]);
        if (dist < bestDist) { bestDist = dist; best = name; }
      }
      if (best) cityCount[best] = (cityCount[best]||0) + 1;
    }
  });

  // Group CITY_CONFIG by country
  const byCC = {};
  for (const [name, cfg] of Object.entries(CITY_CONFIG)) {
    if (!byCC[cfg.cc]) byCC[cfg.cc] = [];
    byCC[cfg.cc].push({ name, ...cfg, count: cityCount[name]||0 });
  }

  const scroll = document.getElementById('nav-scroll');
  scroll.innerHTML = '';
  document.getElementById('nav-total').textContent = data.length.toLocaleString();

  const CC_ORDER = ['TW','JP','KR','TH','HK','AT','HU','IT'];
  const allCCs   = [...new Set([...CC_ORDER, ...Object.keys(byCC)])];

  allCCs.forEach((cc, idx) => {
    const cities = byCC[cc];
    if (!cities||!cities.length) return;
    cities.sort((a,b) => b.count - a.count);
    const meta   = COUNTRY_META[cc] || { flag:'🌍', name:cc, overview:{ center:[0,0], zoom:3 } };
    const total  = ccCount[cc] || 0;
    const isFirst = cc === 'TW';
    const block  = document.createElement('div');
    block.className = 'country-block';

    const header = document.createElement('div');
    header.className = 'country-header' + (isFirst ? ' open' : '');
    header.innerHTML = `<span class="country-arrow${isFirst?' open':''}">▶</span>
      <span class="country-flag">${meta.flag}</span>
      <span class="country-name">${meta.name}</span>
      <span class="country-count">${total}</span>`;
    block.appendChild(header);

    const cityList = document.createElement('div');
    cityList.className = 'cities-list';
    cityList.style.maxHeight = isFirst ? '800px' : '0';

    // "全覽" button
    cityList.appendChild(makeCityBtn({
      name: meta.name + '全覽', icon:'🗺️', count:total, isActive:isFirst,
      center:meta.overview.center, zoom:meta.overview.zoom,
    }));

    cities.forEach(city => {
      cityList.appendChild(makeCityBtn({
        name:city.name, icon:city.icon, sub:city.sub, count:city.count,
        isActive:false, hasData:city.count > 0,
        center:city.center, zoom:city.zoom,
      }));
    });

    block.appendChild(cityList);
    scroll.appendChild(block);

    header.addEventListener('click', () => {
      const isOpen = cityList.style.maxHeight !== '0px' && cityList.style.maxHeight !== '0';
      cityList.style.maxHeight = isOpen ? '0' : '800px';
      header.querySelector('.country-arrow').classList.toggle('open', !isOpen);
      header.classList.toggle('open', !isOpen);
    });
  });
}

function makeCityBtn({ name, icon, sub, count, isActive, hasData=true, center, zoom }) {
  const btn = document.createElement('button');
  btn.className = 'city-btn' + (isActive?'  active':'') + (!hasData?' no-data':'');
  btn.innerHTML = `<span class="city-icon">${icon}</span>
    <div class="city-info">
      <span class="city-name">${name}</span>
      ${sub ? `<span class="city-sub">${sub}</span>` : ''}
    </div>
    ${hasData ? `<span class="city-badge">${count}</span>` : '<span class="city-no-data-tag">暫無資料</span>'}`;
  if (hasData) {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      map.flyTo(center, zoom, { duration:.9, easeLinearity:.3 });
      // 城市導覽只做 flyTo，不自動開啟 popup
    });
  }
  return btn;
}

// ============================================================
//  LAYER CONTROL (right panel)
// ============================================================
function buildLayerControl() {
  const legend  = document.getElementById('legend');
  legend.innerHTML = '';
  const counts  = {};
  ALL_DATA.forEach(d => { const m = getMaster(d.category||''); counts[m] = (counts[m]||0)+1; });

  for (const [master, cfg] of Object.entries(CATEGORIES)) {
    const c = counts[master]||0;
    if (!c) continue;
    // Filter by layerQuery
    if (layerQuery && !master.includes(layerQuery)) {
      // Still process but maybe skip sub-cats
    }
    const grpHeader = document.createElement('div');
    grpHeader.className = 'grp-header';

    const visibleSubs = cfg.subs.filter(sub => {
      if (layerQuery) return sub.includes(layerQuery) || master.includes(layerQuery);
      return true;
    });
    if (layerQuery && !visibleSubs.length && !master.includes(layerQuery)) continue;

    const allHidden = hiddenMasters.has(master);
    grpHeader.innerHTML = `<span class="grp-arrow open">▶</span>
      <span class="grp-icon">${cfg.color ? '' : ''}</span>
      <span class="grp-name"><span style="background:${cfg.color};display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle;border:1.5px solid rgba(255,255,255,.7);box-shadow:0 1px 3px rgba(0,0,0,.2)"></span>${master}</span>
      <span class="grp-count">${c}</span>
      <button class="grp-toggle-all">${allHidden?'顯示':'隱藏'}</button>`;
    legend.appendChild(grpHeader);

    const children = document.createElement('div');
    children.className = 'grp-children';
    children.style.maxHeight = '600px';

    // Single click toggles the whole master group
    const toggleBtn = grpHeader.querySelector('.grp-toggle-all');
    toggleBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (hiddenMasters.has(master)) hiddenMasters.delete(master);
      else hiddenMasters.add(master);
      grpHeader.querySelector('.grp-toggle-all').textContent = hiddenMasters.has(master)?'顯示':'隱藏';
      children.querySelectorAll('.leg-item').forEach(el => el.classList.toggle('hidden', hiddenMasters.has(master)));
      buildMarkers(); updateViewportList();
    });
    // Also update UI state
    if (allHidden) {
      children.querySelectorAll('.leg-item').forEach(el => el.classList.add('hidden'));
    }

    grpHeader.addEventListener('click', e => {
      if (e.target.classList.contains('grp-toggle-all')) return;
      const isOpen = children.style.maxHeight !== '0px';
      children.style.maxHeight = isOpen ? '0' : '600px';
      grpHeader.querySelector('.grp-arrow').classList.toggle('open', !isOpen);
    });

    // Show sub-category breakdown
    const subCounts = {};
    ALL_DATA.forEach(d => { if (getMaster(d.category||'')=== master) subCounts[d.category] = (subCounts[d.category]||0)+1; });
    for (const [sub, sc] of Object.entries(subCounts)) {
      if (layerQuery && !sub.includes(layerQuery) && !master.includes(layerQuery)) continue;
      const item = document.createElement('div');
      item.className = 'leg-item' + (allHidden ? ' hidden' : '');
      item.innerHTML = `<div class="leg-dot" style="background:${cfg.color}"></div>
        <span class="leg-label">${sub}</span>
        <span class="leg-count">${sc}</span>`;
      item.addEventListener('click', () => {
        // Individual sub-cat toggle → toggle master
        if (hiddenMasters.has(master)) hiddenMasters.delete(master);
        else hiddenMasters.add(master);
        children.querySelectorAll('.leg-item').forEach(el => el.classList.toggle('hidden', hiddenMasters.has(master)));
        toggleBtn.textContent = hiddenMasters.has(master)?'顯示':'隱藏';
        buildMarkers(); updateViewportList();
      });
      children.appendChild(item);
    }
    legend.appendChild(children);
  }
}

// ============================================================
//  HEADER COUNTS
// ============================================================
function updateHeaderCounts(data) {
  const cc = {};
  data.forEach(d => { const code = (d.country||d.cc||'').toUpperCase(); cc[code]=(cc[code]||0)+1; });
  document.getElementById('h-total').textContent = data.length.toLocaleString();
  ['TW','JP','KR','TH','HK'].forEach(c => {
    const el = document.getElementById('h-'+c);
    if (el) el.textContent = cc[c]||0;
  });
}

// ============================================================
//  INIT — called once data is ready
// ============================================================
function init(data) {
  ALL_DATA = data;
  updateHeaderCounts(data);
  buildNav(data);
  buildLayerControl();
  buildMarkers();
  document.getElementById('loading-overlay').style.display = 'none';
}

// ============================================================
//  SIDEBAR TOGGLES
// ============================================================
const isMobile = () => window.innerWidth <= 768;
const overlay  = document.getElementById('overlay');

function openMobilePanel(side) {
  document.getElementById('sidebar-left').classList.remove('mobile-open');
  document.getElementById('sidebar-right').classList.remove('mobile-open');
  if (side) {
    document.getElementById(side).classList.add('mobile-open');
    overlay.classList.add('show');
    document.body.classList.add('sheet-open');
  } else {
    overlay.classList.remove('show');
    document.body.classList.remove('sheet-open');
  }
}
overlay.addEventListener('click', () => openMobilePanel(null));

['mob-nav-btn','mob-layer-btn','mob-map-btn'].forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('click', () => {
    if (id === 'mob-map-btn') { openMobilePanel(null); return; }
    const target = id === 'mob-nav-btn' ? 'sidebar-left' : 'sidebar-right';
    const isOpen = document.getElementById(target).classList.contains('mobile-open');
    openMobilePanel(isOpen ? null : target);
  });
});

document.getElementById('btnToggleLeft').addEventListener('click', () => {
  if (isMobile()) { openMobilePanel('sidebar-left'); return; }
  const sl = document.getElementById('sidebar-left');
  sl.classList.toggle('collapsed');
  document.getElementById('btnToggleLeft').classList.toggle('active', !sl.classList.contains('collapsed'));
  setTimeout(() => map.invalidateSize({ animate:false }), 240);
});
document.getElementById('btnToggleRight').addEventListener('click', () => {
  if (isMobile()) { openMobilePanel('sidebar-right'); return; }
  const sr = document.getElementById('sidebar-right');
  sr.classList.toggle('collapsed');
  document.getElementById('btnToggleRight').classList.toggle('active', !sr.classList.contains('collapsed'));
  setTimeout(() => map.invalidateSize({ animate:false }), 240);
});

// Right panel tabs
document.querySelectorAll('.right-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.right-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.right-pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('pane-'+tab.dataset.pane).classList.add('active');
    if (tab.dataset.pane === 'viewport') updateViewportList();

});

// Layer bulk buttons
document.getElementById('btnAll').addEventListener('click', () => {
  hiddenMasters.clear();
  document.querySelectorAll('.leg-item').forEach(el => el.classList.remove('hidden'));
  document.querySelectorAll('.grp-toggle-all').forEach(b => b.textContent = '隱藏');
  buildMarkers(); updateViewportList();
});
document.getElementById('btnNone').addEventListener('click', () => {
  Object.keys(CATEGORIES).forEach(m => hiddenMasters.add(m));
  document.querySelectorAll('.leg-item').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.grp-toggle-all').forEach(b => b.textContent = '顯示');

});

// Layer search filter
document.getElementById('layerSearch').addEventListener('input', e => {
  layerQuery = e.target.value.trim();
  buildLayerControl();
});

// ============================================================
//  LOCAL SEARCH (left panel filter)
// ============================================================
let localSearchTimer;
document.getElementById('localSearch').addEventListener('input', e => {
  clearTimeout(localSearchTimer);
  localSearchTimer = setTimeout(() => {
    filterQuery = e.target.value.toLowerCase().trim();
    buildMarkers();
    if (filterQuery) {
      const hit = ALL_DATA.find(d => d.name && d.name.toLowerCase().includes(filterQuery));
      if (hit && !isNaN(parseFloat(hit.lat))) map.flyTo([parseFloat(hit.lat), parseFloat(hit.lng)], 15, { duration:.7 });
    }
  }, 280);
});

// ============================================================
//  GLOBAL SEARCH (header: local data + Nominatim)
// ============================================================
let searchTimer;
const searchInput   = document.getElementById('globalSearch');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (!q) { searchResults.style.display='none'; return; }
  searchTimer = setTimeout(() => runSearch(q), 300);
});
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { searchResults.style.display='none'; searchInput.blur(); }
});
document.addEventListener('click', e => {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target))
    searchResults.style.display = 'none';
});

function runSearch(q) {
  const lq = q.toLowerCase();
  const local = ALL_DATA.filter(d => d.name && d.name.toLowerCase().includes(lq)).slice(0, 8);
  searchResults.innerHTML = '';
  local.forEach(d => {
    const cfg = getMasterCfg(d.category||'');
    const item = document.createElement('div');
    item.className = 'sr-item';
    item.innerHTML = `<span style="color:${cfg.color};font-size:14px">📍</span>
      <span style="flex:1">${d.name}</span>
      <span class="sr-cat">${d.city||d.category||''}</span>`;
    item.addEventListener('click', () => {
      searchResults.style.display = 'none';
      searchInput.value = '';
      const lat = parseFloat(d.lat), lng = parseFloat(d.lng);
      map.flyTo([lat, lng], 16, { duration:.7 });
      map.once('moveend', () => {
        const entry = markerMap.get(d.name);
        if (entry) setTimeout(() => entry.marker.openPopup(), 120);
      });
    });
    searchResults.appendChild(item);
  });
  // Nominatim separator
  const sep = document.createElement('div');
  sep.style.cssText = 'padding:3px 12px;font-size:9.5px;color:var(--c-text3);border-top:1px solid var(--c-border);background:var(--c-surface2)';
  sep.textContent = '地址搜尋（OpenStreetMap）…';
  searchResults.appendChild(sep);
  searchResults.style.display = 'block';

  fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=4&accept-language=zh-TW`)
    .then(r => r.json())
    .then(results => {
      if (searchResults.contains(sep)) searchResults.removeChild(sep);
      results.forEach(r => {
        const item = document.createElement('div');
        item.className = 'sr-item';
        item.innerHTML = `<span style="font-size:14px">🌐</span>
          <span style="flex:1">${r.display_name.split(',').slice(0,2).join(',')}</span>`;
        item.addEventListener('click', () => {
          searchResults.style.display = 'none';
          searchInput.value = '';
          map.flyTo([parseFloat(r.lat), parseFloat(r.lon)], 14, { duration:.8 });
        });
        searchResults.appendChild(item);
      });
      if (!results.length && !local.length) {
        const empty = document.createElement('div');
        empty.style.cssText = 'padding:10px 12px;font-size:12px;color:var(--c-text3)';
        empty.textContent = '找不到符合的地點';
        searchResults.appendChild(empty);
      }
    })
    .catch(() => { if (searchResults.contains(sep)) searchResults.removeChild(sep); });
}

// ============================================================
//  GPS
// ============================================================
document.getElementById('btnGPS').addEventListener('click', () => {
  const btn = document.getElementById('btnGPS');
  if (!navigator.geolocation) { toast('⚠️ 此瀏覽器不支援定位'); return; }
  btn.classList.add('locating');
  navigator.geolocation.getCurrentPosition(
    pos => {
      btn.classList.remove('locating');
      const { latitude:lat, longitude:lng } = pos.coords;
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.circleMarker([lat, lng], {
        radius:10, fillColor:'#2B5FC0', color:'#fff', weight:3, opacity:1, fillOpacity:.85
      }).addTo(map).bindPopup('📍 您目前的位置').openPopup();
      map.flyTo([lat, lng], 15, { duration:.8 });
      toast('✅ 已定位到您的位置');
    },
    err => {
      btn.classList.remove('locating');
      toast('⚠️ ' + (err.code===1 ? '請允許定位權限' : '無法取得位置'));
    },
    { timeout:8000 }
  );
});

// ============================================================
//  TOAST
// ============================================================
function toast(msg, ms=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ============================================================
//  DATA LOADING — PapaParse + fetch data.csv
//
//  GitHub Pages: HTML fetches data.csv from same directory.
//  Update map content by pushing a new data.csv to your repo.
// ============================================================
function normaliseRow(row) {
  // Accept both old (googleMapsLink/country) and new (city/note) schemas
  return {
    name:          (row.name || row.Name || '').trim(),
    lat:           parseFloat(row.lat || row.Lat || row.latitude || 0),
    lng:           parseFloat(row.lng || row.Lng || row.lon || row.longitude || 0),
    category:      (row.category || row.Category || row.分類 || '其他').trim(),
    city:          (row.city || row.City || row.城市 || '').trim(),
    country:       (row.country || row.cc || row.Country || '').trim().toUpperCase(),
    googleMapsLink:(row.googleMapsLink || row.url || row.URL || '').trim(),
    note:          (row.note || row.Note || row.備註 || '').trim(),
  };
}

document.getElementById('loading-txt').textContent = '正在讀取 data.csv…';

Papa.parse('data.csv', {
  download:    true,      // fetch the file
  header:      true,      // first row is column names
  skipEmptyLines: true,
  complete: function(results) {
    const rows = results.data
      .map(normaliseRow)
      .filter(d => d.name && !isNaN(d.lat) && !isNaN(d.lng) && d.lat && d.lng);

    if (!rows.length) {
      showError('data.csv 解析完成但無有效資料，請確認欄位名稱');
      return;
    }
    console.log('[Map] Loaded', rows.length, 'locations from data.csv via PapaParse');
    init(rows);
  },
  error: function(err) {
    console.error('PapaParse error:', err);
    showError('無法讀取 data.csv：' + (err.message || err));
  }
});

function showError(msg) {
  const overlay = document.getElementById('loading-overlay');
  overlay.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.style.cssText = 'text-align:center;padding:32px 24px;font-family:Noto Sans TC,sans-serif;max-width:380px;margin:0 auto';
  const icon = document.createElement('div');
  icon.style.cssText = 'font-size:44px;margin-bottom:12px';
  icon.textContent = '⚠️';
  wrap.appendChild(icon);
  const title = document.createElement('div');
  title.style.cssText = 'font-size:15px;font-weight:700;color:#B83030;margin-bottom:8px';
  title.textContent = '讀取資料失敗';
  wrap.appendChild(title);
  const detail = document.createElement('div');
  detail.style.cssText = 'font-size:12px;color:#7A7268;line-height:1.8;margin-bottom:16px';
  detail.textContent = msg;
  wrap.appendChild(detail);
  const hint = document.createElement('div');
  hint.style.cssText = 'font-size:11.5px;color:#7A7268;line-height:1.9;background:#F6F3EE;border:1.5px solid #DDD8CF;border-radius:8px;padding:12px 16px;text-align:left';
  hint.innerHTML = '<b style="color:#26211C">請確認：</b><br>' +
    '1. <code style="background:#EDE9E2;padding:0 4px;border-radius:3px">data.csv</code> 與 <code style="background:#EDE9E2;padding:0 4px;border-radius:3px">index.html</code> 在同一資料夾<br>' +
    '2. 透過 HTTP 伺服器開啟（不能直接雙擊）<br>' +
    '3. GitHub Pages 模式：確認 data.csv 已推送到倉庫';
  wrap.appendChild(hint);
  overlay.appendChild(wrap);
}

}); // end DOMContentLoaded
